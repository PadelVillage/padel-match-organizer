<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autovalutazione livello padel - sicura</title>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f6f8fb; color: #222; line-height: 1.5; }
    .container { max-width: 760px; margin: 0 auto; padding: 18px; }
    header { background: #1F4788; color: white; padding: 22px; border-radius: 12px; margin: 18px 0; }
    h1 { margin: 0 0 6px; font-size: 26px; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); margin-bottom: 16px; }
    label { display: block; font-weight: bold; margin: 14px 0 6px; }
    input, select, textarea { width: 100%; padding: 11px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
    button { background: #1F4788; color: white; border: 0; padding: 13px 18px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 16px; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert { padding: 14px; border-radius: 8px; margin: 14px 0; border-left: 5px solid; white-space: pre-line; }
    .info { background: #e3f2fd; border-color: #1F4788; }
    .success { background: #d4edda; border-color: #4CAF50; color: #155724; }
    .warning { background: #fff3cd; border-color: #ff9800; color: #856404; }
    .danger { background: #f8d7da; border-color: #f44336; color: #721c24; }
    .muted { color: #666; font-size: 13px; }
    .field-error { outline: 2px solid #f44336; background: #fff8f8; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎾 Autovalutazione livello padel</h1>
      <div id="clubName">Padel Village</div>
    </header>

    <div class="card">
      <div class="alert info">
        Ciao! Questa scheda serve per aiutare lo staff a proporti partite più equilibrate e adatte al tuo livello. Richiede meno di 2 minuti.
      </div>
      <div id="topStatus"></div>

      <form id="assessmentForm" onsubmit="handleAssessmentSubmit(event)" novalidate>
        <label>Nome</label>
        <input id="firstName" autocomplete="given-name" />

        <label>Cognome</label>
        <input id="lastName" autocomplete="family-name" />

        <label>Telefono</label>
        <input id="phone" type="tel" autocomplete="tel" />

        <label>Da quanto tempo giochi a padel?</label>
        <select id="experience">
          <option value="">Seleziona</option>
          <option>Ho appena iniziato</option>
          <option>Meno di 6 mesi</option>
          <option>Da 6 mesi a 1 anno</option>
          <option>Da 1 a 3 anni</option>
          <option>Da più di 3 anni</option>
        </select>

        <label>Quante volte giochi mediamente al mese?</label>
        <select id="monthlyFrequency">
          <option value="">Seleziona</option>
          <option>Meno di 1 volta al mese</option>
          <option>1-2 volte al mese</option>
          <option>3-5 volte al mese</option>
          <option>6-10 volte al mese</option>
          <option>Più di 10 volte al mese</option>
        </select>

        <label>Quanto ti senti sicuro nei colpi base?</label>
        <select id="basicStrokes">
          <option value="">Seleziona</option>
          <option>Molto poco sicuro</option>
          <option>Abbastanza sicuro</option>
          <option>Sicuro</option>
          <option>Molto sicuro</option>
        </select>

        <label>Sai usare il vetro durante il gioco?</label>
        <select id="glassUsage">
          <option value="">Seleziona</option>
          <option>No, quasi mai</option>
          <option>Qualche volta</option>
          <option>Sì, abbastanza spesso</option>
          <option>Sì, con sicurezza</option>
        </select>

        <label>Sai giocare a rete con volée e bandeja?</label>
        <select id="netPlay">
          <option value="">Seleziona</option>
          <option>No / poco</option>
          <option>Base</option>
          <option>Discreto</option>
          <option>Buono</option>
          <option>Molto buono</option>
        </select>

        <label>Riesci a mantenere la posizione con il compagno?</label>
        <select id="positioning">
          <option value="">Seleziona</option>
          <option>No, mi muovo senza riferimenti precisi</option>
          <option>Abbastanza</option>
          <option>Sì, di solito</option>
          <option>Sì, con buona consapevolezza tattica</option>
        </select>

        <label>Riesci a gestire uno scambio senza cercare subito il punto?</label>
        <select id="rallyPatience">
          <option value="">Seleziona</option>
          <option>No, faccio molti errori</option>
          <option>A volte</option>
          <option>Spesso</option>
          <option>Sì, con buona continuità</option>
        </select>

        <label>Hai mai partecipato a tornei o competizioni?</label>
        <select id="competitions">
          <option value="">Seleziona</option>
          <option>No</option>
          <option>Sì, tornei sociali</option>
          <option>Sì, tornei amatoriali</option>
          <option>Sì, competizioni federali o simili</option>
        </select>

        <label>Secondo te qual è il tuo livello attuale?</label>
        <select id="declaredLevel">
          <option value="">Seleziona</option>
          <option value="1.0">1,0 — Principiante assoluto</option>
          <option value="1.5">1,5 — Principiante con prime basi</option>
          <option value="2.0">2,0 — Base</option>
          <option value="2.5">2,5 — Base evoluto</option>
          <option value="3.0">3,0 — Intermedio basso</option>
          <option value="3.5">3,5 — Intermedio</option>
          <option value="4.0">4,0 — Intermedio buono</option>
          <option value="4.5">4,5 — Avanzato amatoriale</option>
          <option value="5.0">5,0 o superiore — Avanzato</option>
        </select>

        <label>Vuoi essere contattato per partite coerenti con il tuo livello?</label>
        <select id="wantsMatches">
          <option value="">Seleziona</option>
          <option>Sì</option>
          <option>No</option>
          <option>Solo in determinati giorni/orari</option>
        </select>

        <label>Giorni/orari preferiti, opzionale</label>
        <input id="preferredDays" placeholder="Es. lunedì sera, weekend, pranzo..." />

        <label>Note, opzionale</label>
        <textarea id="notes" rows="3"></textarea>

        <button id="submitBtn" type="submit" onclick="handleAssessmentSubmit(event)">Invia autovalutazione</button>
        <div id="submitStatus"></div>
      </form>
      <p class="muted">Il livello indicato è una prima autovalutazione e potrà essere verificato dallo staff.</p>
    </div>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get('t') || '';
    let isSubmitting = false;

    const requiredFields = [
      ['firstName', 'Nome'],
      ['lastName', 'Cognome'],
      ['phone', 'Telefono'],
      ['experience', 'Da quanto tempo giochi a padel'],
      ['monthlyFrequency', 'Quante volte giochi al mese'],
      ['basicStrokes', 'Colpi base'],
      ['glassUsage', 'Uso del vetro'],
      ['netPlay', 'Gioco a rete'],
      ['positioning', 'Posizione con il compagno'],
      ['rallyPatience', 'Gestione dello scambio'],
      ['competitions', 'Tornei o competizioni'],
      ['declaredLevel', 'Livello attuale'],
      ['wantsMatches', 'Disponibilità a essere contattato']
    ];

    function el(id) { return document.getElementById(id); }
    function value(id) { return (el(id)?.value || '').trim(); }
    function escapeHtml(v) { return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); }

    function showMessage(message, type = 'info', scroll = true) {
      const html = `<div class="alert ${type}">${escapeHtml(message)}</div>`;
      if (el('submitStatus')) el('submitStatus').innerHTML = html;
      if (el('topStatus')) el('topStatus').innerHTML = html;
      if (scroll && el('submitStatus')) el('submitStatus').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function cfg() { return window.PADEL_CONFIG || {}; }
    function configReady() {
      const c = cfg();
      return c.SUPABASE_URL && c.SUPABASE_ANON_KEY && !String(c.SUPABASE_URL).includes('INCOLLA') && !String(c.SUPABASE_ANON_KEY).includes('INCOLLA');
    }

    function headers() {
      return {
        'apikey': cfg().SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + cfg().SUPABASE_ANON_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      };
    }

    function validate() {
      requiredFields.forEach(([id]) => el(id)?.classList.remove('field-error'));
      const missing = [];
      let first = null;
      requiredFields.forEach(([id, label]) => {
        if (!value(id)) {
          missing.push(label);
          el(id)?.classList.add('field-error');
          if (!first) first = el(id);
        }
      });
      if (missing.length) {
        showMessage('Compila prima questi campi obbligatori:\n' + missing.slice(0, 6).join('\n') + (missing.length > 6 ? '\n...' : ''), 'warning');
        if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return false;
      }
      return true;
    }

    async function callRpc(functionName, body) {
      const baseUrl = String(cfg().SUPABASE_URL || '').replace(/\/$/, '');
      const url = `${baseUrl}/rest/v1/rpc/${functionName}`;
      const res = await fetch(url, {
        method: 'POST',
        headers: headers(),
        body: JSON.stringify(body)
      });
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; }
      catch (e) { data = text; }
      if (!res.ok) {
        throw new Error(`${functionName} non riuscita: ${typeof data === 'string' ? data : JSON.stringify(data)}`);
      }
      return data;
    }

    async function supabaseGetToken() {
      const data = await callRpc('get_assessment_token', { p_token: token });
      if (!data || data.ok !== true) {
        const error = data?.error || 'TOKEN_NOT_FOUND';
        if (error === 'TOKEN_NOT_FOUND') throw new Error('Link non riconosciuto. Chiedi allo staff un nuovo link.');
        throw new Error('Controllo link non riuscito: ' + error);
      }
      return data;
    }

    async function submitAssessment(payload) {
      const data = await callRpc('submit_self_assessment', {
        p_token: token,
        p_payload: payload
      });
      if (!data || data.ok !== true) {
        const error = data?.error || 'UNKNOWN_ERROR';
        if (error === 'TOKEN_NOT_FOUND') throw new Error('Link non riconosciuto. Chiedi allo staff un nuovo link.');
        if (error === 'ALREADY_COMPLETED') throw new Error('Questa autovalutazione risulta già compilata.');
        if (error === 'ALREADY_SUBMITTED') throw new Error('Questa autovalutazione è già stata inviata.');
        throw new Error('Salvataggio non riuscito: ' + error);
      }
      return data;
    }

    async function handleAssessmentSubmit(event) {
      if (event) event.preventDefault();
      if (isSubmitting) return;

      showMessage('Click ricevuto. Controllo i dati...', 'info');

      if (!token) return showMessage('Link non valido: token mancante. Chiedi allo staff un nuovo link.', 'danger');
      if (!configReady()) return showMessage('Configurazione mancante: controlla che su GitHub esista config.js con SUPABASE_URL e SUPABASE_ANON_KEY.', 'danger');
      if (!validate()) return;

      const button = el('submitBtn');
      try {
        isSubmitting = true;
        button.disabled = true;
        button.textContent = 'Invio in corso...';
        showMessage('Invio in corso... Attendi qualche secondo.', 'info');

        const tokenRow = await supabaseGetToken();
        if (tokenRow.status === 'completed') throw new Error('Questa autovalutazione risulta già compilata.');

        const payload = {
          first_name: value('firstName'),
          last_name: value('lastName'),
          phone: value('phone'),
          experience: value('experience'),
          monthly_frequency: value('monthlyFrequency'),
          basic_strokes: value('basicStrokes'),
          glass_usage: value('glassUsage'),
          net_play: value('netPlay'),
          positioning: value('positioning'),
          rally_patience: value('rallyPatience'),
          competitions: value('competitions'),
          declared_level: parseFloat(value('declaredLevel')),
          calculated_level: parseFloat(value('declaredLevel')),
          wants_matches: value('wantsMatches'),
          preferred_days: value('preferredDays'),
          notes: value('notes')
        };

        await submitAssessment(payload);

        button.textContent = 'Autovalutazione inviata';
        showMessage('Grazie! La tua autovalutazione è stata registrata correttamente.', 'success');
        Array.from(el('assessmentForm').elements).forEach(input => { if (input !== button) input.disabled = true; });
      } catch (error) {
        console.error(error);
        showMessage('Errore: ' + (error.message || 'riprova o avvisa lo staff.'), 'danger');
        button.disabled = false;
        button.textContent = 'Invia autovalutazione';
      } finally {
        isSubmitting = false;
      }
    }

    window.handleAssessmentSubmit = handleAssessmentSubmit;

    window.addEventListener('DOMContentLoaded', () => {
      if (cfg().CLUB_NAME) el('clubName').textContent = cfg().CLUB_NAME;
      if (!token) showMessage('Link non valido: token mancante.', 'danger', false);
      else if (!configReady()) showMessage('Configurazione mancante: controlla config.js su GitHub.', 'danger', false);
      else showMessage('Pagina pronta. Token rilevato: ' + token, 'success', false);
    });

    window.addEventListener('error', e => {
      showMessage('Errore tecnico pagina: ' + (e.message || 'sconosciuto'), 'danger');
    });
  </script>
</body>
</html>
