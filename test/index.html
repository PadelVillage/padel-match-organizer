<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Padel Match Organizer TEST</title>
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:Arial,sans-serif; background:#f6f8fb; color:#1f4788; }
    .loader { width:min(520px, calc(100vw - 32px)); background:#fff; border:1px solid #dfe8f3; border-radius:10px; padding:22px; box-shadow:0 8px 28px rgba(15,23,42,.08); }
    h1 { margin:0 0 8px; font-size:24px; }
    p { margin:0; color:#667085; line-height:1.45; }
    .error { color:#b42318; margin-top:12px; white-space:pre-line; }
  </style>
</head>
<body>
  <main class="loader">
    <h1>Padel Match Organizer TEST</h1>
    <p>Caricamento dell'ultima versione pubblicata sul canale test-preview...</p>
    <p id="testLoaderError" class="error" hidden></p>
  </main>
  <script>
    (async function loadTestPreview() {
      const branch = 'test-preview';
      const sourceUrl = `https://raw.githubusercontent.com/PadelVillage/padel-match-organizer/${branch}/index.html?cache=${Date.now()}`;
      try {
        const response = await fetch(sourceUrl, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const html = await response.text();
        window.PMO_FORCE_ENV = 'test';
        window.PMO_PUBLIC_BASE_URL = 'https://padelvillage.github.io/padel-match-organizer/test/';
        document.open();
        document.write(html);
        document.close();
      } catch (err) {
        const target = document.getElementById('testLoaderError');
        if (target) {
          target.hidden = false;
          target.textContent = `TEST non caricato: ${err && err.message ? err.message : err}`;
        }
      }
    })();
  </script>
</body>
</html>
