<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Padel Match Organizer TEST</title>
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:Arial,sans-serif; background:#f6f8fb; color:#1f4788; }
    .loader { width:min(520px, calc(100vw - 32px)); background:#fff; border:1px solid #dfe8f3; border-radius:10px; padding:22px; box-shadow:0 8px 28px rgba(15,23,42,.08); }
    h1 { margin:0 0 8px; font-size:24px; }
    p { margin:0; color:#667085; line-height:1.45; }
    .error { color:#b42318; margin-top:12px; white-space:pre-line; }
  </style>
</head>
<body>
  <main class="loader">
    <h1>Padel Match Organizer TEST</h1>
    <p>Caricamento dell'ultima versione pubblicata sul canale test-preview...</p>
    <p id="testLoaderError" class="error" hidden></p>
  </main>
  <script>
    (async function loadTestPreview() {
      const repo = 'PadelVillage/padel-match-organizer';
      const branch = 'test-preview';
      const errEl = document.getElementById('testLoaderError');
      const showErr = function (m) { if (errEl) { errEl.hidden = false; errEl.textContent = 'TEST non caricato: ' + m; } };

      async function fetchAppHtml() {
        // 1) ISTANTANEO: ultimo commit del branch → file pinnato al SHA (raw-by-SHA è immutabile, niente cache 5 min)
        try {
          const shaResp = await fetch(
            'https://api.github.com/repos/' + repo + '/commits/' + branch,
            { cache: 'no-store', headers: { 'Accept': 'application/vnd.github.sha' } }
          );
          if (shaResp.ok) {
            const sha = (await shaResp.text()).trim();
            if (/^[0-9a-f]{7,40}$/i.test(sha)) {
              const r = await fetch('https://raw.githubusercontent.com/' + repo + '/' + sha + '/index.html', { cache: 'no-store' });
              if (r.ok) return await r.text();
            }
          }
        } catch (e) { /* passa al fallback */ }
        // 2) FALLBACK: branch raw (può avere la cache ~5 min, ma non si rompe mai — es. rate limit API)
        const r2 = await fetch(
          'https://raw.githubusercontent.com/' + repo + '/' + branch + '/index.html?cache=' + Date.now(),
          { cache: 'no-store' }
        );
        if (!r2.ok) throw new Error('HTTP ' + r2.status);
        return await r2.text();
      }

      try {
        const html = await fetchAppHtml();
        window.PMO_FORCE_ENV = 'test';
        window.PMO_PUBLIC_BASE_URL = 'https://app.padelvillage.club/test/';
        document.open(); document.write(html); document.close();
      } catch (err) {
        showErr(err && err.message ? err.message : String(err));
      }
    })();
  </script>
</body>
</html>
