<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mockup Backup cloud Supabase</title>
  <style>
    :root {
      --green: #168a53;
      --border: #d7dbe3;
      --text: #0f172a;
      --muted: #64748b;
      --button: #6c6c6c;
      --blue: #28509a;
      --blue-dark: #1f4387;
      --bg: #f8fafc;
      --success-bg: #eefaf2;
      --success-border: #b7e4c7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }
    .frame {
      width: min(520px, calc(100vw - 32px));
      padding: 18px;
    }
    .matchpoint-data-box {
      background: #fff;
      border: 1px solid var(--border);
      border-top: 8px solid var(--green);
      border-radius: 12px;
      padding: 28px 30px 30px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
    }
    h3 {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 0 0 18px;
      font-size: 34px;
      line-height: 1.15;
      letter-spacing: 0;
    }
    .matchpoint-data-step {
      display: inline-grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      font-weight: 800;
      font-size: 24px;
      flex: 0 0 auto;
    }
    .matchpoint-data-copy {
      margin: 0 0 18px;
      font-size: 26px;
      line-height: 1.42;
      color: #647086;
    }
    .matchpoint-data-hint {
      margin: 0 0 26px;
      font-size: 22px;
      line-height: 1.45;
      color: #647086;
    }
    .matchpoint-data-actions {
      display: grid;
      gap: 16px;
    }
    button {
      min-height: 76px;
      border: 0;
      border-radius: 12px;
      color: #fff;
      font-size: 27px;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: 0;
      padding: 18px 20px;
      cursor: default;
    }
    .btn-secondary { background: var(--button); }
    .btn-primary { background: var(--blue); }
    .btn-primary:hover { background: var(--blue-dark); }
    .matchpoint-action-state {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 88px;
      border: 1px solid var(--success-border);
      border-radius: 14px;
      background: var(--success-bg);
      color: var(--green);
      font-size: 25px;
      font-weight: 900;
      line-height: 1.18;
      text-align: center;
      padding: 14px 18px;
    }
    .cloud-note {
      margin: -2px 0 0;
      color: var(--muted);
      font-size: 20px;
      line-height: 1.32;
    }
    @media (max-width: 520px) {
      .matchpoint-data-box { padding: 22px 22px 24px; }
      h3 { font-size: 28px; }
      .matchpoint-data-copy { font-size: 22px; }
      .matchpoint-data-hint { font-size: 19px; }
      button { min-height: 64px; font-size: 22px; }
      .matchpoint-action-state { min-height: 76px; font-size: 21px; }
      .cloud-note { font-size: 17px; }
    }
  </style>
</head>
<body>
  <main class="frame">
    <article class="matchpoint-data-box backup" id="anchor-matchpoint-backup">
      <h3><span class="matchpoint-data-step">4</span> Backup dati</h3>
      <p class="matchpoint-data-copy">Salva il backup cloud e scarica automaticamente una copia locale.</p>
      <p class="matchpoint-data-hint">Da fare prima di import importanti o prima di cancellare dati locali.</p>
      <div class="matchpoint-data-actions">
        <button class="btn-primary">Salva backup cloud</button>
        <div class="matchpoint-action-state">Ultimo backup cloud:<br>10/05/2026 • 10:27</div>
        <button class="btn-secondary">Ripristina backup cloud</button>
        <p class="cloud-note">Backup unico sovrascritto su Supabase.</p>
      </div>
    </article>
  </main>
</body>
</html>
