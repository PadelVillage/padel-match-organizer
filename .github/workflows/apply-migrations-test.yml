name: Apply Migrations (TEST)

# Applica le migration Supabase sul progetto TEST.
# Trigger manuale da GitHub Actions → "Run workflow".

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Scrivi "test" per confermare l''apply su Supabase TEST'
        required: true
        default: ''

jobs:
  apply:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'test'
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: cudiqnrrlbyqryrtaprd
    steps:
      - uses: actions/checkout@v4

      - name: Apply migrations → TEST
        run: |
          set -euo pipefail
          echo "Progetto TEST: $SUPABASE_PROJECT_REF"
          npx supabase@latest db push \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --password ""

      - name: Verifica tabelle create
        run: |
          echo "Migration applicate con successo su Supabase TEST ($SUPABASE_PROJECT_REF)."
          echo "Tabelle attese: pmo_parser_errors, pmo_parser_config, booking_parses"
