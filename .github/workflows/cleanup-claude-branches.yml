name: Cleanup stale branches

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete branches older than 1 day (except main and test-preview)
        uses: actions/github-script@v7
        with:
          script: |
            const PROTECTED = ['main', 'test-preview'];
            const MAX_AGE_MS = 1 * 24 * 60 * 60 * 1000;
            const now = Date.now();
            const { data: branches } = await github.rest.repos.listBranches({ owner: context.repo.owner, repo: context.repo.repo, per_page: 100 });
            let deleted = 0;
            for (const branch of branches) {
              if (PROTECTED.includes(branch.name)) { console.log('Protected: ' + branch.name); continue; }
              const { data: commit } = await github.rest.repos.getCommit({ owner: context.repo.owner, repo: context.repo.repo, ref: branch.commit.sha });
              const ageMs = now - new Date(commit.commit.committer.date).getTime();
              if (ageMs > MAX_AGE_MS) {
                try {
                  await github.rest.git.deleteRef({ owner: context.repo.owner, repo: context.repo.repo, ref: 'heads/' + branch.name });
                  console.log('Deleted: ' + branch.name);
                  deleted++;
                } catch (e) { console.log('Skipped: ' + branch.name); }
              } else { console.log('Recent, keeping: ' + branch.name); }
            }
            console.log('Done. Deleted ' + deleted + ' branch(es).');
