name: Guard sync main↔test-preview (worker, CI, istruzioni)

# Alcuni file NON possono differire tra i due rami, perché il ramo su cui vivono non è
# il ramo che ne subisce gli effetti:
#
#  • server.mjs — il worker gira come UN solo processo Hetzner condiviso TEST+PROD e si
#    deploya SOLO da main. Se il server.mjs di test-preview diverge, una promozione può
#    riportare in PROD un worker vecchio → "il deploy rompe un fix precedente".
#  • .github/workflows/** — deploy-edge-functions-test.yml scatta da test-preview, quello
#    PROD da main: un fix alla CI fatto solo su main NON protegge l'altro ramo. Successo il
#    19/07: la lista VERIFY_JWT_FUNCTIONS della #538 stava solo su main, e da test-preview
#    si continuava a deployare con --no-verify-jwt incondizionato.
#  • CLAUDE.md — le istruzioni di progetto valgono per entrambi gli ambienti. Due copie
#    divergenti significano due sessioni che lavorano con regole diverse.
#
# Questo guard fallisce se uno qualunque diverge, così il drift non passa mai inosservato.
#
# Il job `version-order` sorveglia invece la cosa OPPOSTA: APP_VERSION è un contatore
# UNICO condiviso dai due rami, e index.html deve legittimamente differire. Lì la regola
# non è "identici" ma "TEST davanti a PROD" — la ritualità che nello storico compare come
# «chore(version): TEST a vX — riallineo davanti a PROD dopo promozione». Serve perché una
# promozione può portarsi dietro il numero: in quel momento i due rami sono pari, e se il
# riallineo si dimentica non si distinguono più i due ambienti guardando la versione.

on:
  push:
    branches: [main, test-preview]
    paths:
      - 'tools/matchpoint-browser-worker/src/server.mjs'
      - '.github/workflows/**'
      - 'CLAUDE.md'
      - 'index.html'          # per far scattare version-order sui bump di APP_VERSION
  schedule:
    - cron: '0 6 * * *'   # backstop giornaliero (06:00 UTC)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  worker-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: main e test-preview devono essere IDENTICI su worker, CI e istruzioni
        run: |
          set -euo pipefail
          GUARDED="tools/matchpoint-browser-worker/src/server.mjs .github/workflows CLAUDE.md"
          git fetch -q origin main test-preview

          DRIFT=''
          for path in $GUARDED; do
            if git diff --quiet origin/main origin/test-preview -- "$path"; then
              echo "✅ $path — identico"
            else
              echo "::error::DRIFT: $path differisce tra main e test-preview."
              DRIFT="$DRIFT $path"
            fi
          done

          if [ -z "$DRIFT" ]; then
            echo "Nessun drift tra i due rami."
            exit 0
          fi

          echo "----- diffstat (main vs test-preview) -----"
          git --no-pager diff --stat origin/main origin/test-preview -- $DRIFT || true
          echo "-------------------------------------------"
          echo "Il ramo su cui questi file vivono NON è il ramo che ne subisce gli effetti:"
          echo "  · il worker si deploya solo da main ma è condiviso TEST+PROD;"
          echo "  · deploy-edge-functions-test.yml scatta da test-preview, quello PROD da main;"
          echo "  · CLAUDE.md detta le regole a chi lavora su entrambi."
          echo ""
          echo "RIMEDIO (riallinea test-preview a main; NON deploya nulla):"
          echo "  git checkout test-preview"
          for path in $DRIFT; do echo "  git checkout origin/main -- $path"; done
          echo "  git commit -m 'chore: riallinea test-preview a main' && git push origin test-preview"
          echo ""
          echo "Se invece la versione giusta è quella di test-preview, portala su main con una PR:"
          echo "la direzione va scelta, non subita."
          exit 1

  version-order:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: APP_VERSION di test-preview deve stare DAVANTI a quella di main
        run: |
          set -euo pipefail
          git fetch -q origin main test-preview

          # Estrae il numero dalla riga `const APP_VERSION = 'X.YYY';`
          ver_of() {
            git show "$1:index.html" \
              | grep -m1 -oE "APP_VERSION *= *'[0-9]+\.[0-9]+'" \
              | grep -oE "[0-9]+\.[0-9]+" \
              | head -1
          }

          PROD_V="$(ver_of origin/main || true)"
          TEST_V="$(ver_of origin/test-preview || true)"

          if [ -z "$PROD_V" ] || [ -z "$TEST_V" ]; then
            echo "::error::APP_VERSION non trovata (main='$PROD_V' test-preview='$TEST_V')."
            echo "È cambiata la forma della riga in index.html? Il guard non sa più dove guardare;"
            echo "meglio fallire che dare un verde che non ha controllato nulla."
            exit 1
          fi

          echo "PROD (main)         : $PROD_V"
          echo "TEST (test-preview) : $TEST_V"

          if [ "$PROD_V" = "$TEST_V" ]; then
            echo "::error::APP_VERSION IDENTICA sui due rami ($TEST_V)."
            echo ""
            echo "Succede dopo una promozione che si porta dietro il numero: manca il passo di"
            echo "'riallineo davanti a PROD'. Finché resta così i due ambienti non si distinguono"
            echo "guardando la versione, e l'app di TEST si presenta col numero della produzione."
            echo ""
            echo "RIMEDIO: su test-preview bumpa APP_VERSION al numero successivo."
            exit 1
          fi

          # sort -V confronta per componenti numeriche: 6.99 < 6.100 (una sort normale sbaglierebbe).
          if [ "$(printf '%s\n%s\n' "$PROD_V" "$TEST_V" | sort -V | head -1)" = "$TEST_V" ]; then
            echo "::error::TEST ($TEST_V) è DIETRO a PROD ($PROD_V)."
            echo ""
            echo "test-preview è il ramo di lavoro e deve stare davanti: altrimenti, guardando TEST,"
            echo "non sai se hai davanti qualcosa di più nuovo o di più vecchio della produzione."
            echo ""
            echo "RIMEDIO: su test-preview porta APP_VERSION sopra $PROD_V."
            exit 1
          fi

          echo "✅ TEST ($TEST_V) sta davanti a PROD ($PROD_V)."
